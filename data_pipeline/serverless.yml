service: trademate-ingestion-pipeline

provider:
  name: aws
  region: ap-south-1
  architecture: arm64
  profile: zygotrix
  stage: ${opt:stage, 'dev'}
  timeout: 900      # 15 min max — handles large documents
  memorySize: 2048  # Document parsing + embedding is memory-heavy
  ecr:
    images:
      ingestion-img:
        path: ./
        file: Dockerfile.lambda
  iam:
    role:
      statements:
        # Read uploaded documents
        - Effect: Allow
          Action:
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${env:AWS_S3_BUCKET_NAME}/uploads/*
        # Write job status files
        - Effect: Allow
          Action:
            - s3:PutObject
            - s3:GetObject
          Resource:
            - arn:aws:s3:::${env:AWS_S3_BUCKET_NAME}/pipeline-status/*
        # Forward failed events to DLQ
        - Effect: Allow
          Action:
            - sqs:SendMessage
          Resource:
            - !GetAtt IngestionDLQ.Arn
  environment:
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
    PINECONE_API_KEY: ${env:PINECONE_API_KEY}
    OPENAI_API_KEY: ${env:OPENAI_API_KEY}

functions:
  ingestion:
    name: ${self:service}-${self:provider.stage}-ingestion
    image:
      name: ingestion-img
    description: "Ingests uploaded documents into Pinecone (TradeMate)"
    events:
      # Fires automatically when any file lands under uploads/ in the bucket
      - s3:
          bucket: ${env:AWS_S3_BUCKET_NAME}
          event: s3:ObjectCreated:*
          rules:
            - prefix: uploads/
          existing: true

resources:
  Resources:

    # ── Dead Letter Queue ────────────────────────────────────────────────────────
    IngestionDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${self:provider.stage}-dlq
        MessageRetentionPeriod: 1209600  # 14 days — enough time to investigate and reprocess
        VisibilityTimeout: 905           # Lambda max timeout (900s) + 5s buffer

    # Wires up the DLQ: after 2 Lambda retries (3 total attempts), failed events
    # land in the DLQ instead of being silently discarded.
    IngestionEventInvokeConfig:
      Type: AWS::Lambda::EventInvokeConfig
      Properties:
        FunctionName: !Ref IngestionLambdaFunction
        Qualifier: $LATEST
        MaximumRetryAttempts: 2
        DestinationConfig:
          OnFailure:
            Destination: !GetAtt IngestionDLQ.Arn

    # ── CloudWatch Alarm ─────────────────────────────────────────────────────────
    # Fires within 5 minutes of any message appearing in the DLQ.
    DLQDepthAlarm:
      Type: AWS::CloudWatch::Alarm
      Properties:
        AlarmName: ${self:service}-${self:provider.stage}-dlq-depth
        AlarmDescription: "Failed Lambda ingestion events in DLQ — run scripts/reprocess_dlq.py"
        MetricName: ApproximateNumberOfMessagesVisible
        Namespace: AWS/SQS
        Dimensions:
          - Name: QueueName
            Value: !GetAtt IngestionDLQ.QueueName
        Statistic: Maximum
        Period: 300
        EvaluationPeriods: 1
        Threshold: 1
        ComparisonOperator: GreaterThanOrEqualToThreshold
        TreatMissingData: notBreaching
